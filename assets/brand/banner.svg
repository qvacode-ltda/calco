<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1280"
  height="320"
  viewBox="0 0 1280 320"
  role="img"
  aria-label="Calco — clone any production website into a clean Astro codebase"
>
  <!-- QvaCode DS: ink page, hairline grid, cyan reserved for the mark and data -->
  <rect width="1280" height="320" fill="#0A0E1A" />

  <!-- hairline grid -->
  <line x1="0" y1="64" x2="1280" y2="64" stroke="#22314F" stroke-width="1" />
  <line x1="0" y1="256" x2="1280" y2="256" stroke="#22314F" stroke-width="1" />
  <line x1="96" y1="0" x2="96" y2="320" stroke="#1A2338" stroke-width="1" />
  <line x1="1184" y1="0" x2="1184" y2="320" stroke="#1A2338" stroke-width="1" />

  <!-- top rail: label -->
  <text
    x="128"
    y="42"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace"
    font-size="18"
    letter-spacing="1"
    fill="#8A9BB5"
  >website reverse-engineering kit</text>
  <text
    x="1152"
    y="42"
    text-anchor="end"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace"
    font-size="18"
    letter-spacing="1"
    fill="#8A9BB5"
  >open source / by QVACODE</text>

  <!-- the mark: a dashed source square and its solid cyan calco -->
  <g transform="translate(128, 112)">
    <rect x="0" y="0" width="70" height="70" fill="none" stroke="#8A9BB5" stroke-width="6" stroke-dasharray="10 10" />
    <rect x="26" y="26" width="70" height="70" fill="none" stroke="#22D3EE" stroke-width="10" />
  </g>

  <!-- wordmark -->
  <text
    x="288"
    y="188"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace"
    font-size="88"
    font-weight="700"
    letter-spacing="12"
    fill="#F4F7FB"
  >CALCO</text>

  <!-- kicker -->
  <rect x="292" y="214" width="12" height="12" fill="#22D3EE" />
  <text
    x="316"
    y="226"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace"
    font-size="20"
    letter-spacing="1"
    fill="#8A9BB5"
  >clone any production website into a clean astro codebase</text>

  <!-- bottom rail: spec sheet -->
  <text
    x="128"
    y="296"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace"
    font-size="18"
    letter-spacing="1"
    fill="#8A9BB5"
  >astro 7 / tailwind v4 / cloudflare workers / claude code</text>
</svg>
