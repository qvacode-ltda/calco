# Publishes the example clone (examples/tailwindcss.com) to GitHub Pages so
# visitors can compare it against the original site. Zero secrets required.
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/tailwindcss.com/**"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    working-directory: examples/tailwindcss.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            examples/tailwindcss.com/package-lock.json

      # Rolldown's tsconfig discovery also loads the repo-root tsconfig.json,
      # whose `extends: astro/tsconfigs/strict` resolves from the root
      # node_modules — without this install the example build fails with
      # TSCONFIG_ERROR: Tsconfig not found.
      - name: Install root dependencies
        run: npm ci
        working-directory: .

      - name: Install dependencies
        run: npm ci

      - name: Build with Pages base path
        run: npm run build:pages
        env:
          ASTRO_BASE: /calco

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/tailwindcss.com/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
