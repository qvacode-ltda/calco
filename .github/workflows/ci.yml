# Verifies the Calco boilerplate itself: types (astro check), lint, build.
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "examples/**"
      - "**.md"
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check, lint and build
        run: npm run verify
